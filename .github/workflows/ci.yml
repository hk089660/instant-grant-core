# we-ne: build, lint, and automated test checks
name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLANA_VERSION: "1.18.0"
  ANCHOR_VERSION: "0.31.1"
  NODE_VERSION: "20"

jobs:
  lockfile_policy:
    name: Lockfile policy (npm-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce lockfile policy
        run: bash scripts/check-lockfile-policy.sh

  contract:
    name: Smart contract (Anchor)
    runs-on: ubuntu-latest
    needs: lockfile_policy
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: grant_program

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: grant_program/package-lock.json

      - name: Rust checks
        working-directory: grant_program/programs/grant_program
        run: |
          cargo check --all-features
          cargo clippy --all-targets -- -D warnings

      - name: Cache Solana CLI tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/solana/
            ~/.local/share/solana/
          key: solana-cli-${{ runner.os }}-build-${{ env.SOLANA_VERSION }}

      - name: Install Solana CLI tools
        run: |
          SOLANA_BIN_DIR="$(bash scripts/install-solana-cli.sh "${SOLANA_VERSION}")"
          echo "${SOLANA_BIN_DIR}" >> "${GITHUB_PATH}"
          "${SOLANA_BIN_DIR}/solana" --version

      - name: Install Anchor CLI
        run: npm install --global --fetch-retries=5 @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Install grant_program deps (npm ci)
        run: |
          cd grant_program && npm ci

      - name: Build
        working-directory: grant_program
        run: anchor build

      - name: Localnet integration test (Anchor)
        working-directory: grant_program
        run: |
          export ANCHOR_PROVIDER_URL="http://127.0.0.1:8899"
          export ANCHOR_WALLET="${RUNNER_TEMP}/anchor-wallet.json"
          solana-keygen new --no-bip39-passphrase --silent -o "$ANCHOR_WALLET"
          anchor test --skip-build --provider.cluster localnet

  api_worker:
    name: API worker (Vitest + TypeScript)
    runs-on: ubuntu-latest
    needs: lockfile_policy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: api-worker/package-lock.json

      - name: Install dependencies
        working-directory: api-worker
        run: npm ci

      - name: Run tests
        working-directory: api-worker
        run: npm test

      - name: Type check
        working-directory: api-worker
        run: npx tsc --noEmit

  mobile:
    name: Mobile app (Vitest + TypeScript)
    runs-on: ubuntu-latest
    needs: lockfile_policy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: wene-mobile/package-lock.json

      - name: Install dependencies
        working-directory: wene-mobile
        run: npm ci --legacy-peer-deps

      - name: Run server tests
        working-directory: wene-mobile
        run: npm run test:server

      - name: Type check
        working-directory: wene-mobile
        run: npx tsc --noEmit
